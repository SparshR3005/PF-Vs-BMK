name: Fetch TRI data

on:
  workflow_dispatch:
  schedule:
    # 14:30 UTC = 20:00 IST, after NSE EOD TRI publication
    - cron: "30 14 * * 1-5"

permissions:
  contents: write

concurrency:
  group: tri-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Raised from 25: the index set grew from 17 to 39. Happy path is ~4-6 min, but
    # each index allows 4 attempts with backoff, so a few slow/walled indices can
    # push a run well past 25. A timeout kills the job and commits nothing, so the
    # ceiling must have real headroom.
    timeout-minutes: 45
    steps:
      # Actions are pinned to commit SHAs (not floating tags) so a compromised or
      # retagged upstream release can't silently change what runs against a token
      # with contents:write. Comments record the human-readable version.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          sudo apt-get install -y xvfb

      # The continuity gate is the only thing standing between a bad fetch and a
      # permanently rewritten history. If its tests don't pass, do not fetch and do
      # not commit — a skipped day costs nothing, a corrupted series is forever.
      - name: Run regression tests (gate)
        run: python tests/test_fetch_tri.py

      # The JS suites guard the benchmark ROUTING that this data feeds: a fund
      # routed to the wrong index produces a confidently wrong spread even when
      # every TRI series is perfect. Cheap to run, and a red suite means the
      # committed data would be interpreted incorrectly — so gate on it too.
      - name: Matching / routing regression tests (gate)
        run: |
          node tests/test_matching.js
          node tests/test_insights.js

      - name: Fetch TRI (headful under xvfb)
        run: xvfb-run -a python fetch_tri.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tri
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update TRI data [skip ci]"
            # The scheduled job can race with a concurrent push; rebase and retry
            # once rather than failing the run and skipping a day of data.
            git push || (git pull --rebase --autostash && git push)
          fi