name: Tests

# Runs on every push and PR. This is the control that stops the v4 failure mode:
# a CHANGELOG claiming fixes ("re-verified in a Node harness", "unit-tested against
# the adversarial fixture") that were never actually applied to the shipped code.
# If a fix regresses, this goes red before the claim reaches a client report.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      # Syntax gates: cheap, and they catch a broken paste of index.html before
      # anything else runs.
      - name: Syntax check fetch_tri.py
        run: python -m py_compile fetch_tri.py

      - name: Syntax check index.html JavaScript
        run: |
          python - <<'EOF'
          import re, pathlib, subprocess, sys, tempfile
          html = pathlib.Path("index.html").read_text(encoding="utf-8")
          blocks = re.findall(r"<script>(.*?)</script>", html, re.S)
          if not blocks:
              sys.exit("no inline <script> block found in index.html")
          with tempfile.NamedTemporaryFile("w", suffix=".js", delete=False) as fh:
              fh.write("\n".join(blocks))
              tmp = fh.name
          subprocess.run(["node", "--check", tmp], check=True)
          print(f"node --check passed ({len(blocks)} script block(s))")
          EOF

      - name: Python regression tests
        run: python tests/test_fetch_tri.py

      - name: JavaScript regression tests
        run: node tests/test_app.js
