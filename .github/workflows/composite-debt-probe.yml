name: Probe Nifty Composite Debt

on:
  workflow_dispatch:
    inputs:
      commit_result:
        description: Commit the exact validated series when found
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: composite-debt-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Playwright and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium
          sudo apt-get install -y xvfb

      - name: Static and identity tests
        run: |
          python -m py_compile fetch_tri.py probe_composite_debt.py
          python probe_composite_debt.py --self-test

      - name: Run strict public-source probe
        id: probe
        shell: bash
        run: |
          set +e
          xvfb-run -a python probe_composite_debt.py 2>&1 | tee composite-debt-probe.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload diagnostic log and exact JSON if found
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.3
        with:
          name: nifty-composite-debt-probe
          path: |
            composite-debt-probe.log
            data/tri/NIFTY_COMPOSITE_DEBT.json
          if-no-files-found: warn
          retention-days: 14

      - name: Commit exact validated series
        if: inputs.commit_result && steps.probe.outputs.status == '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tri/NIFTY_COMPOSITE_DEBT.json
          if git diff --staged --quiet; then
            echo "No data change to commit."
          else
            git commit -m "Add exact Nifty Composite Debt history [skip ci]"
            git push || (git pull --rebase --autostash && git push)
          fi

      - name: Report outcome
        shell: bash
        run: |
          case "${{ steps.probe.outputs.status }}" in
            0) echo "Exact NSE_D_214 series found and validated." ;;
            2) echo "No exact public series found on the tested routes." ; exit 2 ;;
            *) echo "A candidate failed strict identity/series validation." ; exit 3 ;;
          esac