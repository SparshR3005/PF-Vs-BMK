name: Refresh TRI data

on:
  workflow_dispatch:        # lets you click "Run workflow"
  schedule:
    - cron: "0 20 * * 0"    # every Sunday 20:00 UTC (~1:30am Mon IST)

permissions:
  contents: write            # allow committing data files back

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Fetch TRI data
        run: python fetch_tri.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update TRI data"
          git push
